<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DRM Video Player - MPD Stream</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.13/dist/shaka-player.compiled.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 DRM Video Player</h1>
            <p>MPD Stream with Widevine Support</p>
        </div>

        <div class="input-section">
            <label for="apiUrl">🔗 Enter API URL:</label>
            <div class="input-group">
                <input type="text" id="apiUrl" placeholder="https://bypass-pearl-tau.vercel.app/api/proxy?url=https://jgxgc.vercel.app/api/get_video_details?name=4716251_0_4981670265767740" value="https://bypass-pearl-tau.vercel.app/api/proxy?url=https://jgxgc.vercel.app/api/get_video_details?name=4716251_0_4981670265767740">
                <button id="loadBtn" class="btn-primary">▶ Load Video</button>
            </div>
        </div>

        <div class="player-container" id="playerContainer" style="display: none;">
            <div class="video-wrapper">
                <video id="videoPlayer" controls playsinline></video>
            </div>
            <div class="video-info" id="videoInfo"></div>
        </div>

        <div class="status-container">
            <div class="status" id="status">
                <div class="status-icon">⏳</div>
                <div class="status-text">Ready to load video...</div>
            </div>
        </div>

        <div class="debug-section">
            <details>
                <summary>🔧 Debug Information</summary>
                <pre id="debugLog"></pre>
            </details>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
